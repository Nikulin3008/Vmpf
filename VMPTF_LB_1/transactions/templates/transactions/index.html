<!DOCTYPE html>
<html>
<head>
    <title>Мої транзакції</title>
    <style>
        body { font-family: sans-serif; margin: 40px; }
        table { width: 100%; border-collapse: collapse; margin-top: 20px; }
        th, td { border: 1px solid #ddd; padding: 12px; text-align: left; }
        th { background-color: #f4f4f4; }
        .budget { background: #e3f2fd; padding: 20px; border-radius: 8px; margin-bottom: 20px; }
    </style>
</head>
<body>

    <div class="budget">
        <h2>Загальний баланс: {{ balance }} грн</h2>
    </div>

    <form method="GET">
        <input type="text" name="search" placeholder="Пошук за описом..." value="{{ request.GET.search }}">
        
        <select name="category">
            <option value="">Всі категорії</option>
            {% for cat in categories %}
                <option value="{{ cat.id }}" {% if request.GET.category == cat.id|stringformat:"i" %}selected{% endif %}>
                    {{ cat.name }}
                </option>
            {% endfor %}
        </select>
        
        <button type="submit">Фільтрувати</button>
        <a href="/">Скинути</a>
    </form>

    <table>
        <tr>
            <th>Опис</th>
            <th>Категорія</th>
            <th>Сума</th>
            <th>Тип</th>
        </tr>
        {% for t in transactions %}
        <tr>
            <td>{{ t.description }}</td>
            <td>{{ t.category.name|default:"—" }}</td>
            <td>{{ t.amount }}</td>
            <td>{{ t.transaction_type }}</td>
        </tr>
        {% empty %}
        <tr><td colspan="4">Транзакцій не знайдено</td></tr>
        {% endfor %}
    </table>

</body>
</html>
